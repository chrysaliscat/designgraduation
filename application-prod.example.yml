# Production configuration example.
# Copy this file to /opt/agriculture/config/application-prod.yml on the server.
# Do not commit the real application-prod.yml with production passwords.
#
# Start command:
# java -jar /opt/agriculture/backend/app.jar --spring.profiles.active=prod --spring.config.additional-location=/opt/agriculture/config/application-prod.yml

ruoyi:
  name: AgriShop
  version: 3.9.1
  copyrightYear: 2026
  profile: /opt/agriculture/uploadPath
  addressEnabled: false
  captchaType: math

server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    uri-encoding: UTF-8
    accept-count: 1000
    threads:
      max: 800
      min-spare: 100

spring:
  messages:
    basename: i18n/messages
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  devtools:
    restart:
      enabled: false
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    druid:
      master:
        url: jdbc:mysql://127.0.0.1:3306/agriculture?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai
        username: agriculture_user
        password: change-me
      slave:
        enabled: false
        url:
        username:
        password:
  redis:
    host: agriculture-redis
    port: 6379
    database: 0
    password:
    timeout: 10s
    lettuce:
      pool:
        min-idle: 0
        max-idle: 8
        max-active: 8
        max-wait: -1ms

logging:
  level:
    com.ruoyi: info
    org.springframework: warn

token:
  header: Authorization
  secret: change-me-to-a-long-random-secret
  expireTime: 30

mybatis:
  typeAliasesPackage: com.ruoyi.**.domain
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  configLocation: classpath:mybatis/mybatis-config.xml

pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

swagger:
  enabled: false
  pathMapping: /api

xss:
  enabled: true
  excludes: /system/notice
  urlPatterns: /system/*,/monitor/*,/tool/*
